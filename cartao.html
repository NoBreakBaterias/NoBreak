<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão Digital | NoBreak Baterias</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Variáveis de Cores e Estilo */
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --primary-yellow: #FFD700;
            --primary-hover: #e6c200;
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
        }

        /* Reset Básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at top, #222222 0%, #0d0d0d 60%);
        }

        /* Container Principal do Cartão */
        .card-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 420px; /* Tamanho ideal para emular tela de celular no Desktop */
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 215, 0, 0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Detalhe visual amarelo no topo */
        .card-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--primary-yellow);
        }

        /* Cabeçalho e Logo */
        .logo-container {
            width: 100px;
            height: 100px;
            background-color: var(--primary-yellow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            font-size: 45px;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            border: 4px solid var(--card-bg);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--text-gray);
            margin-bottom: 20px;
        }

        /* Badge de Entrega */
        .delivery-badge {
            background-color: rgba(255, 215, 0, 0.1);
            color: var(--primary-yellow);
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        /* Seção de Links/Botões */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-whatsapp {
            background-color: var(--primary-yellow);
            color: #000; /* Texto preto para legibilidade perfeita no amarelo */
        }

        .btn-whatsapp:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .btn-map, .btn-share {
            background-color: transparent;
            color: var(--text-white);
            border: 2px solid #333;
        }

        .btn-map:hover, .btn-share:hover {
            border-color: var(--primary-yellow);
            color: var(--primary-yellow);
            background-color: rgba(255, 215, 0, 0.05);
        }

        .btn i {
            font-size: 1.2rem;
        }

        /* Marcas */
        .brands-section {
            border-top: 1px solid #333;
            padding-top: 20px;
            margin-bottom: 20px;
        }

        .brands-section h3 {
            font-size: 0.85rem;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .brands-list {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .brand-tag {
            background-color: #2a2a2a;
            color: var(--text-white);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Rodapé */
        .footer {
            font-size: 0.8rem;
            color: var(--text-gray);
            line-height: 1.5;
        }

        .footer span {
            color: var(--primary-yellow);
            font-weight: 600;
        }

    </style>
</head>
<body>

    <div class="card-container">
        <header>
            <div class="logo-container">
                <i class="fa-solid fa-car-battery"></i>
            </div>
            <h1>NoBreak Baterias</h1>
            <p class="tagline">Comércio Especializado de Baterias</p>
            
            <div class="delivery-badge">
                <i class="fa-solid fa-truck-fast"></i> Entrega e Instalação Grátis
            </div>
        </header>

        <main class="links-container">
            <a href="https://wa.me/5542984023985?text=Olá!%20Vim%20pelo%20Cartão%20Digital%20e%20preciso%20de%20ajuda%20com%20minha%20bateria." target="_blank" class="btn btn-whatsapp">
                <i class="fa-brands fa-whatsapp"></i> Chamar no WhatsApp
            </a>

            <a href="https://maps.app.goo.gl/z9hf5jGqXoN2EEpM8" target="_blank" class="btn btn-map">
                <i class="fa-solid fa-location-dot"></i> Como Chegar
            </a>

            <button id="btnShare" class="btn btn-share">
                <i class="fa-solid fa-share-nodes"></i> Compartilhar Cartão
            </button>
        </main>

        <section class="brands-section">
            <h3>Trabalhamos com</h3>
            <div class="brands-list">
                <span class="brand-tag">Moura</span>
                <span class="brand-tag">Zetta</span>
                <span class="brand-tag">Eletran</span>
                <span class="brand-tag">AGM</span>
                <span class="brand-tag">EFB</span>
            </div>
        </section>

        <footer class="footer">
            <p>Tv. Rio de Janeiro, 1713</p>
            <p>Jd das araucárias 2 - <span>Castro/PR</span></p>
        </footer>
    </div>

    <script>
        document.getElementById('btnShare').addEventListener('click', async () => {
            const shareData = {
                title: 'NoBreak Baterias',
                text: 'Precisando de bateria? Entrega e instalação grátis em Castro-PR. Confira nosso contato!',
                url: window.location.href // Pega automaticamente a URL onde este arquivo estiver hospedado
            }

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                    console.log('Cartão compartilhado com sucesso!');
                } else {
                    // Fallback para caso o navegador (desktop antigo) não suporte compartilhamento nativo
                    navigator.clipboard.writeText(window.location.href);
                    alert('Link do cartão copiado para a área de transferência!');
                }
            } catch (err) {
                console.error('Erro ao compartilhar:', err);
            }
        });
    </script>
</body>
</html>
